<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<nav class="tab-nav">
    <button class="tab-btn active" data-target="view-home">Translate</button>
    <button class="tab-btn" data-target="view-settings">Settings</button>
</nav>

<div class="container">
    <div id="view-home" class="view active">
        <header>
            <div class="brand">
                <div>
                    <h1>MangaLens</h1>
                    <p class="subtitle">AI Contextual Translation</p>
                </div>
                <span class="badge" id="modelBadge">Loading...</span>
            </div>
        </header>

        <div class="card" style="margin-top: 20px;">
            <button id="translateBtn" class="btn btn-primary">
                <span style="font-size: 1.1em;">文A</span> Translate Current Page
            </button>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="card">
            <div class="input-group">
                <label for="apiKey">Google AI Studio API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your API key...">
            </div>

            <div class="input-group">
                <label for="modelSelect">Translation Model</label>
                <select id="modelSelect">
                    <option value="gemini-3.1-flash-preview">Gemini 3.1 Flash</option>
                    <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="input-group toggle-group">
                <label class="switch-container">
                    <span class="switch-description">SHOW ✨ BUTTONS ON IMAGES</span>
                    <div class="switch">
                        <input type="checkbox" id="inlineBtnToggle">
                        <span class="slider"></span>
                    </div>
                </label>
            </div>

            <div class="input-group toggle-group" style="margin-bottom: 0;">
                <label class="switch-container">
                    <span class="switch-description">DEFAULT TO STUDY MODE</span>
                    <div class="switch">
                        <input type="checkbox" id="defaultStudyModeToggle">
                        <span class="slider"></span>
                    </div>
                </label>
            </div>
        </div>

        <button id="saveBtn" class="btn btn-secondary" style="margin-top: 10px;">Save Settings</button>
        <button id="clearCacheBtn" class="btn btn-secondary danger" style="margin-top: 10px;">Clear Image Cache</button>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
