<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
    <header>
        <div class="brand">
            <h1>MangaLens</h1>
            <span class="badge" id="modelBadge">Gemini 3 Flash</span>
        </div>
        <p class="subtitle">AI Contextual Translation</p>
    </header>

    <div class="card">
        <div class="input-group">
            <label for="apiKey">Google AI Studio API Key</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." autocomplete="off" />
        </div>

        <div class="input-group">
            <label for="modelSelect">Translation Model</label>
            <select id="modelSelect">
                <option value="gemini-3-flash-preview">Gemini 3 Flash (Default)</option>
                <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                <option value="gemini-2.5-flash" disabled>Gemini 2.5 Flash</option>
                <option value="gemini-2.5-flash-lite" disabled>Gemini 2.5 Flash Lite</option>
            </select>
        </div>

        <div class="input-group toggle-group">
            <label class="switch-container">
                <span class="switch-description">Show ✨ Buttons on Images</span>
                <div class="switch">
                    <input type="checkbox" id="inlineBtnToggle" checked />
                    <span class="slider round"></span>
                </div>
            </label>
        </div>
        <button id="saveBtn" class="btn btn-secondary">Save Settings</button>
    </div>

    <div class="action-area">
        <button id="translateBtn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            Translate Current Page
        </button>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
